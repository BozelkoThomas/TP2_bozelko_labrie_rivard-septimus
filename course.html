<!doctype html>
<html lang="fr">
 
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jeu de course</title>
    <link rel="stylesheet" href="./assets/course.css">
    <script src="./assets/course.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">
</head>
 
<body>
    <div id="fin"></div>
    <div id="compteARebours" class="countdown"></div>
    <header>
        <img src="./assets/img/logo.svg" alt="" class="logo">
        <h1>Course de voiture</h1>
    </header>
    <main>
        <div>
            <img src="./assets/img/ligne_haut.svg" alt="" class="line" />
        </div>
        <div>
            <img src="./assets/img/auto_mauve.svg" alt="" class="car" id="voiture1" />
        </div>
        <div>
            <img src="./assets/img/ligne_milieu.png" alt="" class="line" />
        </div>
        <div>
            <img src="./assets/img/auto_rose.svg" alt="" class="car" id="voiture2" />
        </div>
        <div>
            <img src="./assets/img/ligne_bas.svg" alt="" class="line" />
        </div>
    </main>
    <footer>
        <button onclick="demarrerCourse()" type="button" id="btn">COMMENCER</button>
        <div class="time">
            <div class="time__player">
                <label for="mauve">Temps mauve :</label>
                <input type="text" name="mauve" id="tempsMauve" value="00:00:00">
            </div>
            <div class="time__player">
                <label for="rose">Temps rose :</label>
                <input type="text" name="rose" id="tempsRose" value="00:00:00" />
            </div>
        </div>
    </footer>
</body>
 
</html>
